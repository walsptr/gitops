apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault
  namespace: bookslib-prod
spec:
  provider:
    vault:
      server: https://vault.syawal.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: bookslib-prod-eso
          serviceAccountRef:
            name: bookslib-vault-auth
