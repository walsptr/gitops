apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bookslib-dev
  namespace: argocd
spec:
  project: bookslib
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: REPLACE_ME_GITOPS_REPO_URL
    targetRevision: main
    path: argocd/apps/dev
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
