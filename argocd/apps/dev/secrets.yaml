apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bookslib-dev-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: bookslib
  destination:
    server: https://kubernetes.default.svc
    namespace: bookslib-dev
  source:
    repoURL: https://github.com/walsptr/gitops.git
    targetRevision: main
    path: eso/dev
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
