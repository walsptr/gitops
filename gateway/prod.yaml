apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth
  namespace: bookslib-prod
spec:
  parentRefs:
    - name: syawal-gateway
      namespace: nginx-gateway
      sectionName: http
  hostnames:
    - auth.syawal.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: auth-service
          port: 8081
---
